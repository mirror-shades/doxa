name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test (${{ matrix.arch }} ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64 }   # x86_64 Linux
          - { os: ubuntu-24.04-arm, arch: aarch64 }  # aarch64 Linux
          - { os: macos-13,         arch: x86_64 }   # Intel macOS
          - { os: macos-14,         arch: aarch64 }  # Apple Silicon macOS
          - { os: windows-latest,   arch: x86_64 }   # x86_64 Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
